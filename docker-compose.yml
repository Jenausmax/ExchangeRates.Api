version: '3.3'

services:
  exchangerates-api:
    build:
      context: ./src
      dockerfile: ExchangeRates.Api/Dockerfile
    container_name: exchangerates-api
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DbData=Data Source=/app/data/Data.db;foreign keys=false;
      - ClientConfig__SiteApi=https://www.cbr-xml-daily.ru/
      - ClientConfig__SiteGet=daily_json.js
      - ClientConfig__PeriodMinute=30
      - ClientConfig__TimeUpdateJobs=08:40
      - ClientConfig__JobsValute=false
      - ClientConfig__JobsValuteToHour=True
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - exchangerates-network

  exchangerates-bot:
    build:
      context: ./src
      dockerfile: bot/ExchangeRatesBot/Dockerfile
    container_name: exchangerates-bot
    depends_on:
      - exchangerates-api
      - exchangerates-news
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      # КРИТИЧНО: Внутренний адрес API в Docker сети
      - BotConfig__UrlRequest=http://exchangerates-api:80/
      # Токен бота из .env файла
      - BotConfig__BotToken=${BOT_TOKEN}
      # Режим работы: true = polling (рекомендуется для Docker), false = webhook
      - BotConfig__UsePolling=${BOT_USE_POLLING:-true}
      # Webhook URL (используется только если UsePolling=false)
      - BotConfig__Webhook=${BOT_WEBHOOK:-}
      # Время рассылки сообщений
      - BotConfig__TimeOne=${BOT_TIME_ONE:-14:05}
      - BotConfig__TimeTwo=${BOT_TIME_TWO:-15:32}
      # ОТДЕЛЬНАЯ БД бота (не путать с БД API)
      - ConnectionStrings__SqliteConnection=Data Source=/app/data/Data.db;foreign keys=false;
      # Новостной сервис
      - BotConfig__NewsServiceUrl=http://exchangerates-news:80/
      - BotConfig__NewsEnabled=${NEWS_ENABLED:-false}
      - BotConfig__NewsTime=${NEWS_TIME:-09:00}
      - BotConfig__ImportantNewsEnabled=${IMPORTANT_NEWS_ENABLED:-false}
    volumes:
      # ОТДЕЛЬНЫЕ volumes от API
      - ./bot-data:/app/data
      - ./bot-logs:/app/logs
    restart: unless-stopped
    networks:
      - exchangerates-network

  exchangerates-news:
    build:
      context: ./src
      dockerfile: newsservice/NewsService/Dockerfile
    container_name: exchangerates-news
    ports:
      - "5002:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__NewsDb=Data Source=/app/data/News.db;foreign keys=false;
      - NewsConfig__Enabled=true
      - NewsConfig__FetchIntervalMinutes=60
      - NewsConfig__SendTime=09:00
      - NewsConfig__MaxNewsPerDigest=5
      # LLM провайдер: "" (отключен), "polza", "ollama"
      - LlmConfig__Provider=${LLM_PROVIDER:-}
      - LlmConfig__PolzaApiKey=${POLZA_API_KEY:-}
      - LlmConfig__OllamaUrl=${OLLAMA_URL:-http://localhost:11434}
    volumes:
      - ./news-data:/app/data
      - ./news-logs:/app/logs
    restart: unless-stopped
    networks:
      - exchangerates-network

networks:
  exchangerates-network:
    driver: bridge
